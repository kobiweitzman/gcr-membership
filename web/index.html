<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>GCR Membership</title>
<style>
:root {
  --bg-1: #0d1627;
  --bg-2: #111d38;
  --bg-3: #17254a;
  --text: #fff;
  --text-dim: rgba(255,255,255,0.45);
  --text-mid: rgba(255,255,255,0.72);
  --cyan: #32d2f5;
  --blue: #5b8af5;
  --indigo: #7b6cf6;
  --purple: #a855f7;
  --pink: #ec4899;
  --orange: #f59e0b;
  --yellow: #fbbf24;
  --green: #22c55e;
  --mint: #34d399;
  --red: #ef4444;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: var(--bg-1);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
}

/* ===== BACKGROUND ===== */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(145deg, #0d1627 0%, #111d38 35%, #17254a 60%, #1b2d5a 80%, #111d38 100%);
}
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px; top: -160px; left: -120px; background: radial-gradient(circle, rgba(50,210,245,0.18) 0%, transparent 70%); filter: blur(60px); animation: float1 16s ease-in-out infinite; }
.orb-2 { width: 400px; height: 400px; top: 30%; right: -120px; background: radial-gradient(circle, rgba(91,138,245,0.20) 0%, transparent 70%); filter: blur(70px); animation: float2 20s ease-in-out infinite; }
.orb-3 { width: 350px; height: 350px; bottom: 10%; left: -60px; background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 65%); filter: blur(80px); animation: float3 18s ease-in-out infinite; }
.orb-4 { width: 300px; height: 300px; top: 55%; left: 40%; background: radial-gradient(circle, rgba(123,108,246,0.12) 0%, transparent 65%); filter: blur(90px); animation: float1 22s ease-in-out infinite reverse; }

@keyframes float1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,-30px)} 66%{transform:translate(-15px,20px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-25px,15px)} 66%{transform:translate(15px,-25px)} }
@keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-15px)} }

/* ===== GLASS CARD ===== */
.glass {
  position: relative;
  background: linear-gradient(145deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.07) 100%);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  backdrop-filter: blur(40px) saturate(1.5);
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.35),
    0 2px 8px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.10);
  overflow: hidden;
}
/* Top sheen highlight */
.glass::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
  pointer-events: none;
  border-radius: 20px 20px 0 0;
  z-index: 0;
}

/* Premium header glass */
.glass-premium {
  background: linear-gradient(145deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.09) 100%);
  border: 1px solid rgba(255,255,255,0.20);
  box-shadow:
    0 12px 48px rgba(0,0,0,0.40),
    0 4px 16px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.08),
    0 0 40px rgba(50,210,245,0.05),
    0 0 80px rgba(91,138,245,0.03);
}
.glass-premium::before {
  background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 40%, transparent 100%);
}

/* Stat cards — extra bright glass */
.glass-stat {
  background: linear-gradient(145deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.09) 100%);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    0 6px 24px rgba(0,0,0,0.30),
    0 2px 8px rgba(0,0,0,0.20),
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.glass-stat:active {
  transform: scale(0.96);
  box-shadow:
    0 2px 12px rgba(0,0,0,0.30),
    inset 0 1px 0 rgba(255,255,255,0.20);
}

/* Section glass — clickable card */
.glass-section {
  cursor: pointer;
  transition: transform 0.2s;
}
.glass-section:active { transform: scale(0.98); }

/* ===== TAB BAR ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-around; align-items: center;
  padding: 6px 0 calc(6px + var(--safe-bottom));
  background: rgba(10,16,30,0.88);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 600;
  padding: 4px 20px; cursor: pointer; transition: color 0.2s; position: relative;
}
.tab-btn.active { color: var(--cyan); }
.tab-btn.active::after {
  content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px; border-radius: 1px; background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.tab-btn svg { width: 22px; height: 22px; fill: currentColor; }

/* ===== PAGES ===== */
.page-wrapper { position: relative; overflow: hidden; min-height: 100dvh; z-index: 1; }
.page {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 16px 16px calc(76px + var(--safe-bottom));
  min-height: 100dvh;
  visibility: hidden; pointer-events: none;
}
.page.active { position: relative; visibility: visible; pointer-events: auto; }

/* ===== HEADER ===== */
.header-card { text-align: center; padding: 22px 20px; margin-bottom: 14px; }
.header-card h1 {
  font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 20%, rgba(255,255,255,0.80) 60%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-card p { font-size: 13px; color: var(--text-dim); margin-top: 5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }

/* ===== STATS ===== */
.stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat-card { flex: 1; padding: 18px 4px; text-align: center; position: relative; }
.stat-value {
  font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums;
  text-shadow: 0 0 18px currentColor;
}
.stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-glow {
  position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
  border-radius: 1px; filter: blur(3px); opacity: 0.7;
}

/* ===== EXPANDABLE SECTIONS ===== */
.expand-panel {
  display: none;
  margin-top: -6px;
  margin-bottom: 14px;
}
.expand-panel.open { display: block; }
.expand-panel-inner { padding: 14px 16px; }

.expand-inside {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.4s ease, opacity 0.3s ease;
}
.expand-inside.open { max-height: 2000px; opacity: 1; }

.section-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.chevron { font-size: 12px; color: var(--text-dim); transition: transform 0.3s; margin-left: auto; }
.chevron.open { transform: rotate(180deg); }

/* ===== BAR CHARTS ===== */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-size: 13px; font-weight: 700; width: 46px; flex-shrink: 0; font-variant-numeric: tabular-nums; color: var(--text-mid); }
.bar-track {
  flex: 1; height: 22px; border-radius: 7px; overflow: hidden;
  background: rgba(255,255,255,0.04);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}
.bar-fill {
  height: 100%; border-radius: 7px; position: relative;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}
.bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.28) 0%, transparent 55%);
  border-radius: 7px;
}
.bar-count { font-size: 13px; font-weight: 800; width: 36px; text-align: right; color: var(--text-mid); font-variant-numeric: tabular-nums; }

/* ===== ROWS ===== */
.chapter-row, .member-row {
  display: flex; align-items: center; gap: 12px; padding: 11px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer;
  transition: background 0.15s; border-radius: 10px;
}
.chapter-row:active, .member-row:active { background: rgba(255,255,255,0.05); }
.rank-badge {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.avatar {
  width: 40px; height: 40px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
}
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.row-count { font-size: 16px; color: var(--text-dim); }
.mini-bar { height: 14px; border-radius: 4px; margin-right: 6px; flex-shrink: 0; position: relative; overflow: hidden; }
.mini-bar::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.3) 0%,transparent 50%); border-radius:4px; }

/* ===== SEARCH & FILTERS ===== */
.search-box {
  width: 100%; padding: 11px 16px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
  color: var(--text); font-size: 15px; outline: none;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  margin-bottom: 12px; transition: border-color 0.2s;
}
.search-box:focus { border-color: rgba(50,210,245,0.4); }
.search-box::placeholder { color: var(--text-dim); }
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); color: var(--text-mid);
  cursor: pointer; transition: all 0.2s;
}
.filter-chip.active {
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 10px rgba(50,210,245,0.30);
}

/* ===== SPLIT BAR ===== */
.split-bar { display:flex; gap:3px; height:38px; margin-bottom:12px; border-radius:8px; overflow:hidden; }
.split-segment { display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; position:relative; overflow:hidden; }
.split-segment::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.22) 0%,transparent 50%); }
.split-legend { display:flex; justify-content:space-between; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-mid); font-weight:600; }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  background: linear-gradient(155deg, var(--bg-1), var(--bg-2), var(--bg-3));
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; padding-top: calc(16px + var(--safe-top)); padding-bottom: calc(16px + var(--safe-bottom));
}
.detail-panel.open { transform: translateX(0); }
.back-btn {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: var(--cyan);
  padding: 9px 16px; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; margin-bottom: 14px; transition: all 0.15s;
}
.back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.10); }
.detail-header { text-align: center; margin-bottom: 18px; }
.detail-avatar {
  width: 76px; height: 76px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 26px; font-weight: 700;
  margin: 0 auto 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
}
.detail-name { font-size: 22px; font-weight: 800; }
.detail-tags { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.detail-section { margin-top: 12px; padding: 16px; }
.detail-section h3 { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.detail-row .label { font-size: 14px; color: var(--text-dim); }
.detail-row .value { font-size: 14px; font-weight: 500; }
.detail-row a { color: var(--cyan); text-decoration: none; }

/* ===== EXPAND DETAIL ROWS ===== */
.expand-detail-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; }
.expand-detail-row .dl { color: var(--text-dim); }
.expand-detail-row .dv { color: var(--text-mid); font-weight: 700; }
.group-label { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px; margin: 16px 0 8px 4px; }
.count-badge { font-size: 13px; color: var(--text-dim); font-weight: 600; }

/* ===== INSTALL BANNER ===== */
.install-banner {
  position: fixed; bottom: 68px; left: 16px; right: 16px; z-index: 150;
  padding: 14px 16px; display: none; align-items: center; gap: 10px;
}
.install-banner.show { display: flex; }
.install-banner p { flex: 1; font-size: 13px; }
.install-banner button {
  background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #fff;
  border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer;
}
.install-close { background: none !important; color: var(--text-dim) !important; font-size: 18px; padding: 4px 8px !important; }

/* ===== ANIMATIONS ===== */
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.anim { animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.anim-done { animation: none !important; opacity: 1 !important; transform: none !important; }
.d1{animation-delay:.04s} .d2{animation-delay:.08s} .d3{animation-delay:.12s} .d4{animation-delay:.16s} .d5{animation-delay:.20s} .d6{animation-delay:.24s}

/* ===== SPLASH SCREEN ===== */
@keyframes splashSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes splashPulse {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(50,210,245,0.4)) drop-shadow(0 0 60px rgba(91,138,245,0.2)); }
  50% { filter: drop-shadow(0 0 35px rgba(50,210,245,0.6)) drop-shadow(0 0 80px rgba(91,138,245,0.35)); }
}
@keyframes splashExitSpin {
  0% { transform: rotate(0deg) scale(1); opacity: 1; }
  70% { transform: rotate(1080deg) scale(1.1); opacity: 1; }
  100% { transform: rotate(1440deg) scale(0); opacity: 0; }
}
@keyframes splashFadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
.splash-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-1);
}
.splash-logo {
  width: 120px; height: 120px; border-radius: 28px;
  animation: splashSpin 3s linear infinite, splashPulse 2s ease-in-out infinite;
}
.splash-logo.exit {
  animation: splashExitSpin 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.splash-screen.exit {
  animation: splashFadeOut 0.3s ease 0.4s forwards;
}
.splash-text {
  margin-top: 24px; font-size: 14px; font-weight: 600;
  color: var(--text-mid); letter-spacing: 1px; text-transform: uppercase;
}
.splash-dots::after {
  content: ''; animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
}
</style>
</head>

async function loadGoals() {
  try {
    // Load from cache only if valid new format (has months + chapters objects)
    const cached = localStorage.getItem('gcr_goals');
    if (cached) {
      try {
        const parsed = JSON.parse(cached);

          goalsData = parsed;
        } else {
          localStorage.removeItem('gcr_goals'); // discard old format
        }
      } catch(e) { localStorage.removeItem('gcr_goals'); }
    }
    // Fetch fresh data, bypassing cache to avoid stale SW/browser cache
    const r = await fetch(GOALS_URL, { cache: 'no-store' });
    if (r.ok) {
      const data = await r.json();
      if (data && Array.isArray(data.months) && data.chapters) {

        localStorage.setItem('gcr_goals', JSON.stringify(goalsData));
      }
    }
  } catch(e) {

}

function processData() {

    order: name.includes('AZA')?'AZA': name.includes('BBG')?'BBG':'BBYO'
  })).sort((a,b) => a.name.localeCompare(b.name));
}

function initials(n) { const p=n.split(' '); return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase(); }
function orderColor(o) { return o==='AZA'?'var(--cyan)':o==='BBG'?'var(--pink)':'var(--orange)'; }
function orderBg(o) { return o==='AZA'?'rgba(50,210,245,0.15)':o==='BBG'?'rgba(236,72,153,0.15)':'rgba(245,158,11,0.15)'; }
function fmtPhone(p) { if(!p)return null; const d=p.replace(/\D/g,''); return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:p; }
function fmtDate(d) { if(!d)return null; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function gradYears() { return [...new Set(members.map(m=>m.gradYear).filter(Boolean))].sort(); }
function yearGrad(y) {

  return m[y]||'linear-gradient(90deg,#888,#666)';
}

// ===== JOIN TIMELINE (LINE GRAPH) =====
let joinTimeRange = 12; // default 1Y
function getJoinTimeline(chapterFilter, monthCount) {
  const src = chapterFilter ? members.filter(m => m.chapterName === chapterFilter) : members;
  const withDate = src.filter(m => m.joinDate);
  if (!withDate.length) return [];
  const counts = {};
  withDate.forEach(m => {
    const key = m.joinDate.substring(0, 7);
    counts[key] = (counts[key] || 0) + 1;
  });
  const end = new Date(); end.setDate(1);
  let start;
  if (monthCount === 'all') {
    const keys = Object.keys(counts).sort();
    start = new Date(keys[0] + '-01');
  } else {
    start = new Date(end);
    start.setMonth(start.getMonth() - (monthCount - 1));
  }
  const months = [];
  const cur = new Date(start);
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  while (cur <= end) {
    const key = cur.toISOString().substring(0, 7);
    const yr = String(cur.getFullYear()).slice(2);
    months.push({ key, label: `${mn[cur.getMonth()]} '${yr}`, shortLabel: mn[cur.getMonth()], count: counts[key] || 0 });
    cur.setMonth(cur.getMonth() + 1);
  }
  return months;
}
function renderJoinLineGraph(timeline) {
  const container = document.getElementById('join-chart-container');
  if (!container) return;
  if (!timeline.length) { container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px 0;">No join data available.</div>'; return; }
  const W = container.clientWidth || 340;
  const H = 200;
  const padL = 32, padR = 12, padT = 12, padB = 28;
  const gW = W - padL - padR, gH = H - padT - padB;
  const max = Math.max(...timeline.map(t => t.count), 1);
  // Nice Y ticks
  const tickCount = 4;
  const rawStep = max / tickCount;
  const step = rawStep <= 1 ? 1 : rawStep <= 5 ? Math.ceil(rawStep) : Math.ceil(rawStep / 5) * 5;
  const yMax = step * tickCount;
  const yTicks = [];
  for (let i = 0; i <= tickCount; i++) yTicks.push(step * i);
  // Points
  const pts = timeline.map((t, i) => {
    const x = padL + (timeline.length > 1 ? (i / (timeline.length - 1)) * gW : gW / 2);
    const y = padT + gH - (t.count / yMax) * gH;
    return { x, y, ...t };
  });
  const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
  const areaPath = `M${pts[0].x},${padT + gH} ${pts.map(p => `L${p.x},${p.y}`).join(' ')} L${pts[pts.length-1].x},${padT + gH} Z`;
  // X labels: show every Nth to avoid crowding
  const maxLabels = Math.floor(gW / 42);
  const labelStep = Math.max(1, Math.ceil(timeline.length / maxLabels));

  let svg = `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;">`;
  svg += `<defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(34,197,94,0.25)"/><stop offset="100%" stop-color="rgba(34,197,94,0)"/></linearGradient>
  </defs>`;
  // Grid lines + Y labels
  yTicks.forEach(v => {
    const y = padT + gH - (v / yMax) * gH;
    svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="4,4"/>`;
    svg += `<text x="${padL - 6}" y="${y + 4}" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="end" font-family="inherit">${v}</text>`;
  });
  // Area + Line
  svg += `<path d="${areaPath}" fill="url(#areaGrad)"/>`;
  svg += `<polyline points="${polyline}" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  // Dots + invisible hit targets
  pts.forEach(p => {
    svg += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#22c55e" stroke="rgba(13,22,39,0.6)" stroke-width="1.5"/>`;
    svg += `<circle cx="${p.x}" cy="${p.y}" r="14" fill="transparent" onclick="showJoinTooltip(event,${Math.round(p.x)},${Math.round(p.y)},'${p.label}',${p.count})"/>`;
  });
  // X labels
  pts.forEach((p, i) => {
    if (i % labelStep === 0 || i === pts.length - 1) {
      svg += `<text x="${p.x}" y="${H - 14}" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="inherit">${timeline[i].shortLabel}</text>`;
    }
  });
  svg += '</svg>';
  container.innerHTML = svg;
}
function showJoinTooltip(e, x, y, label, count) {
  e.stopPropagation();
  let tip = document.getElementById('join-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'join-tooltip';
    tip.style.cssText = 'position:absolute;z-index:50;padding:6px 10px;border-radius:10px;background:rgba(30,40,60,0.92);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:12px;font-weight:700;color:#fff;pointer-events:none;white-space:nowrap;transition:opacity 0.15s;';
    document.getElementById('join-chart-container').style.position = 'relative';
    document.getElementById('join-chart-container').appendChild(tip);
  }
  tip.innerHTML = `${label}: <span style="color:var(--green)">${count}</span> joined`;
  tip.style.opacity = '1';
  const cw = document.getElementById('join-chart-container').clientWidth;
  let left = x - 40;
  if (left + 100 > cw) left = cw - 110;
  if (left < 0) left = 4;
  tip.style.left = left + 'px';
  tip.style.top = (y - 36) + 'px';
  clearTimeout(tip._hide);
  tip._hide = setTimeout(() => { tip.style.opacity = '0'; }, 2000);
}
function setJoinRange(months) {
  joinTimeRange = months;
  document.querySelectorAll('.join-range-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.range == months);

}
function updateJoinChart() {
  const sel = document.getElementById('join-chapter-filter');
  const chFilter = sel ? sel.value : '';
  const timeline = getJoinTimeline(chFilter || null, joinTimeRange);
  renderJoinLineGraph(timeline);
}

  return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;${i>0?'border-top:1px solid rgba(255,255,255,0.04);':''}">
    <div class="rank-badge" style="background:${bg}">${i+1}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ch.name}</div>
      <div style="font-size:11px;font-weight:700;color:${orderColor(ch.order)}">${ch.order}</div>
    </div>
    <div class="mini-bar" style="background:${barGrad};width:${Math.max(ch.count/maxCh*60,8)}px;"></div>
    <div style="font-size:14px;font-weight:800;color:var(--text-mid);width:30px;text-align:right;">${ch.count}</div>
  </div>`;
}

// ===== GOALS =====
function goalPctColor(pct) {
  if (pct >= 100) return 'var(--green)';
  if (pct >= 75) return 'var(--cyan)';
  if (pct >= 50) return 'var(--blue)';
  if (pct >= 30) return 'var(--orange)';
  return 'var(--red)';
}
function goalPctGrad(pct) {
  if (pct >= 100) return 'linear-gradient(90deg, var(--green), var(--mint))';
  if (pct >= 75) return 'linear-gradient(90deg, var(--cyan), var(--blue))';
  if (pct >= 50) return 'linear-gradient(90deg, var(--blue), var(--indigo))';
  if (pct >= 30) return 'linear-gradient(90deg, var(--orange), var(--yellow))';
  return 'linear-gradient(90deg, var(--red), var(--orange))';
}

  if (!goalsData || !goalsData.months || !goalsData.chapters || !members.length) {
    const msg = !members.length ? 'Loading member data...' : 'Loading goals...';
    pg.innerHTML = '<div class="glass glass-premium header-card anim"><h1>Goals</h1><p>MEMBERSHIP TARGETS</p></div><div class="glass anim d1" style="padding:40px 20px;text-align:center;border-radius:16px;"><div style="color:var(--text-dim);font-size:14px;">' + msg + '</div><div style="margin-top:12px;"><button onclick="loadGoals().then(()=>{if(members.length)renderGoals();})" style="background:rgba(50,210,245,0.15);border:1px solid rgba(50,210,245,0.3);color:var(--cyan);padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">Retry</button></div></div>';
    return;
  }
  const total = members.length;
  const regionGoal = goalsData.regionGoal || 1000;
  const regionPct = Math.min(Math.round(total / regionGoal * 100), 100);
  const totalNewGoal = goalsData.totalNewGoal || 91;

  const monthMap = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const goalMonths = goalsData.months || ['Jan','Feb','Mar','Apr'];
  const thisYear = new Date().getFullYear();
  const curMonth = new Date().getMonth();

  // Count actual new members per chapter per goal-month
  function getActuals(chName) {
    return goalMonths.map(mn => {
      const mi = monthMap[mn];
      return members.filter(m => {
        if (!m.joinDate || (m.chapterName||'') !== chName) return false;
        const d = new Date(m.joinDate+'T00:00:00');
        return d.getFullYear() === thisYear && d.getMonth() === mi;
      }).length;
    });
  }

  // Region monthly goals (sum across chapters) and actuals
  const rMonthGoals = goalMonths.map((_,i) =>
    Object.values(goalsData.chapters).reduce((s,ch) => s + (ch.monthly[i]||0), 0)
  );
  const rMonthActuals = goalMonths.map(mn => {
    const mi = monthMap[mn];
    return members.filter(m => {
      if (!m.joinDate) return false;
      const d = new Date(m.joinDate+'T00:00:00');
      return d.getFullYear() === thisYear && d.getMonth() === mi;
    }).length;
  });
  const totalNewActual = rMonthActuals.reduce((a,b) => a+b, 0);
  const newPct = totalNewGoal > 0 ? Math.min(Math.round(totalNewActual / totalNewGoal * 100), 100) : 0;

  // Build chapter goals list
  const chGoals = [];
  Object.entries(goalsData.chapters).forEach(([name, data]) => {
    const actuals = getActuals(name);
    const actualTotal = actuals.reduce((a,b) => a+b, 0);
    const ch = chapters.find(c => c.name === name);
    const order = ch ? ch.order : 'BBYO';
    const pct = data.total > 0 ? Math.min(Math.round(actualTotal / data.total * 100), 150) : 0;
    chGoals.push({ name, goalTotal: data.total, monthly: data.monthly, actuals, actualTotal, pct, order });
  });
  chGoals.sort((a,b) => b.pct - a.pct);

  // SVG ring
  const R = 70, circ = 2*Math.PI*R, off = circ*(1-regionPct/100);

  // Month column for region overview
  function monthCol(mn, i) {
    const goal = rMonthGoals[i], actual = rMonthActuals[i];
    const mi = monthMap[mn];
    const past = mi < curMonth, cur = mi === curMonth;
    const met = actual >= goal && goal > 0;
    const fillPct = goal > 0 ? Math.min(actual/goal*100, 100) : 0;
    const clr = met ? 'var(--green)' : (past||cur) ? 'var(--cyan)' : 'rgba(255,255,255,0.08)';
    return '<div style="flex:1;text-align:center;">' +
      '<div style="font-size:11px;font-weight:800;color:' + (met?'var(--green)':'var(--text-mid)') + ';margin-bottom:4px;">' + actual + '/' + goal + '</div>' +
      '<div style="height:70px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);overflow:hidden;display:flex;align-items:flex-end;">' +
        '<div style="width:100%;height:' + fillPct + '%;background:' + clr + ';border-radius:0 0 7px 7px;position:relative;overflow:hidden;transition:height 1s cubic-bezier(0.16,1,0.3,1);"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.2) 0%,transparent 50%);"></div></div>' +
      '</div>' +
      '<div style="font-size:10px;color:var(--text-dim);font-weight:700;margin-top:4px;">' + mn + '</div>' +
    '</div>';
  }

  // Chapter row with monthly breakdown
  function chRow(ch, isLast) {
    const dp = Math.min(ch.pct, 100);
    let h = '<div style="margin-bottom:' + (isLast?'0':'14') + 'px;' + (isLast?'':'padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.04);') + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
    h += '<div style="font-size:13px;font-weight:700;color:'+orderColor(ch.order)+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;">'+ch.name+'</div>';
    h += '<div style="font-size:12px;font-weight:800;color:'+goalPctColor(ch.pct)+';">'+ch.actualTotal+' / '+ch.goalTotal+'</div>';
    h += '</div>';
    // Progress bar
    h += '<div style="height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:8px;">';
    h += '<div style="height:100%;width:'+dp+'%;background:'+goalPctGrad(ch.pct)+';border-radius:4px;position:relative;overflow:hidden;transition:width 1s cubic-bezier(0.16,1,0.3,1);"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.3) 0%,transparent 50%);border-radius:4px;"></div></div>';
    h += '</div>';
    // Monthly mini cells
    h += '<div style="display:flex;gap:4px;">';
    goalMonths.forEach((mn, i) => {
      const a = ch.actuals[i], g = ch.monthly[i]||0;
      const mi = monthMap[mn];
      const past = mi < curMonth, cur = mi === curMonth;
      const met = a >= g && g > 0;
      const bg = met ? 'rgba(34,197,94,0.12)' : (past && g > 0 && a < g) ? 'rgba(239,68,68,0.10)' : 'rgba(255,255,255,0.03)';
      const tc = g === 0 ? 'var(--text-dim)' : met ? 'var(--green)' : (past && a < g) ? 'var(--red)' : cur ? 'var(--orange)' : 'var(--text-dim)';
      h += '<div style="flex:1;text-align:center;padding:4px 0;border-radius:6px;background:'+bg+';">';
      h += '<div style="font-size:9px;color:var(--text-dim);font-weight:700;">'+mn+'</div>';
      h += '<div style="font-size:11px;font-weight:800;color:'+tc+';">'+a+'/'+g+'</div>';
      h += '</div>';
    });
    h += '</div></div>';
    return h;
  }

  pg.innerHTML = `
    <div class="glass glass-premium header-card anim">
      <h1>Goals</h1>
      <p>MEMBERSHIP TARGETS</p>
    </div>

    <div class="glass anim d1" style="padding:20px;margin-bottom:14px;border-radius:16px;">
      <div style="text-align:center;font-size:14px;font-weight:700;margin-bottom:4px;">Region Membership</div>
      <div style="display:flex;justify-content:center;margin:16px 0;">
        <div style="position:relative;width:180px;height:180px;">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
            <circle cx="90" cy="90" r="${R}" fill="none" stroke="url(#goalRingGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1);transform:rotate(-90deg);transform-origin:center;"/>
            <defs><linearGradient id="goalRingGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#32d2f5"/><stop offset="100%" stop-color="#5b8af5"/></linearGradient></defs>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="font-size:36px;font-weight:800;color:var(--cyan);text-shadow:0 0 20px rgba(50,210,245,0.4);">${regionPct}%</div>
            <div style="font-size:12px;color:var(--text-dim);font-weight:600;">${total} / ${regionGoal}</div>
          </div>
        </div>
      </div>
      <div style="margin-top:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-size:13px;font-weight:700;color:var(--text-mid);">New Member Recruitment</div>
          <div style="font-size:13px;font-weight:800;color:${newPct>=100?'var(--green)':'var(--cyan)'};">${totalNewActual} / ${totalNewGoal}</div>
        </div>
        <div style="height:10px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;">
          <div style="height:100%;width:${newPct}%;background:linear-gradient(90deg, var(--cyan), var(--blue));border-radius:5px;position:relative;overflow:hidden;transition:width 1s cubic-bezier(0.16,1,0.3,1);"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.3) 0%,transparent 50%);border-radius:5px;"></div></div>
        </div>
      </div>
    </div>

    <div class="glass anim d2" style="padding:16px;margin-bottom:14px;border-radius:16px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;">Monthly Overview</div>
      <div style="display:flex;gap:8px;">
        ${goalMonths.map((m,i) => monthCol(m,i)).join('')}
      </div>
    </div>

    <div class="glass anim d3" style="padding:16px;margin-bottom:14px;border-radius:16px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px;">Chapter Goals</div>
      ${chGoals.map((ch,i) => chRow(ch, i === chGoals.length-1)).join('')}
    </div>`;
}

    renderChapterGroup('AZA Chapters',f.filter(c=>c.order==='AZA').sort((a,b)=>b.count-a.count))+
    renderChapterGroup('BBG Chapters',f.filter(c=>c.order==='BBG').sort((a,b)=>b.count-a.count))+

        <div><div style="font-size:26px;font-weight:800;color:${orderColor(ch.order)};text-shadow:0 0 16px currentColor;">${ch.order}</div><div style="font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;margin-top:2px;">Order</div></div>

    `<div class="count-badge" style="margin-bottom:8px;">${f.length} members</div>`+

// ===== TABS =====
const tabOrder = ['dashboard','goals','chapters','members'];
function switchTab(name) {
  const cur = currentTab();
  if (cur === name) return;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('chapter-detail-panel').classList.remove('open');

  document.getElementById(cur + '-page').classList.remove('active');
  document.getElementById(name + '-page').classList.add('active');
  window.scrollTo(0, 0);
}

function currentTab() { return document.querySelector('.tab-btn.active').dataset.tab; }

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ===== SWIPE NAVIGATION =====
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
  touchStartTime = Date.now();
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7 || dt > 400) return;
  const idx = tabOrder.indexOf(currentTab());
  if (dx < 0 && idx < tabOrder.length - 1) switchTab(tabOrder[idx + 1]);
  if (dx > 0 && idx > 0) switchTab(tabOrder[idx - 1]);
}, { passive: true });

const splashStart = Date.now();
const SPLASH_MIN_MS = 1800; // minimum time splash is shown
let firstRender = true;
let chartObserver = null;
function renderAll(){
  renderDashboard();updateJoinChart();try{renderGoals();}catch(e){}renderChapters();renderMembers();
  // Watch chart container for size changes (handles splash reveal + rotation)
  if (!chartObserver) {
    const cc = document.getElementById('join-chart-container');
    if (cc) {
      let lastW = 0;
      chartObserver = new ResizeObserver(entries => {
        const w = entries[0].contentRect.width;
        if (w > 0 && w !== lastW) { lastW = w; updateJoinChart(); }
      });
      chartObserver.observe(cc);
    }
  }
  if (firstRender) {
    firstRender = false;
    const elapsed = Date.now() - splashStart;
    const remaining = Math.max(0, SPLASH_MIN_MS - elapsed);
    setTimeout(dismissSplash, remaining);
  }
}
function dismissSplash() {
  const splash = document.getElementById('splash');
  const logo = document.getElementById('splash-logo');
  if (!splash) return;
  // Fast spin + shrink the logo
  logo.classList.add('exit');
  splash.classList.add('exit');
  // After exit animation, remove splash and show content
  setTimeout(() => {
    splash.remove();
    document.getElementById('main-content').style.display = '';
    document.getElementById('tab-bar').style.display = '';
    // Disable staggered animations so tab switches are instant
    setTimeout(() => {
      document.querySelectorAll('.anim').forEach(el => el.classList.add('anim-done'));
    }, 800);
  }, 700);
}

// ===== NEW MEMBER NOTIFICATIONS =====
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
function checkForNewMembers(freshMembers) {
  const prevNames = JSON.parse(localStorage.getItem('gcr_known_members') || '[]');
  if (!prevNames.length) {
    // First load — just save the current list, don't notify
    localStorage.setItem('gcr_known_members', JSON.stringify(freshMembers.map(m => m.fullName)));
    return;
  }
  const prevSet = new Set(prevNames);
  const newMembers = freshMembers.filter(m => !prevSet.has(m.fullName));
  if (newMembers.length > 0) {
    // Save updated list
    localStorage.setItem('gcr_known_members', JSON.stringify(freshMembers.map(m => m.fullName)));
    // Send notifications
    if ('Notification' in window && Notification.permission === 'granted') {
      newMembers.forEach(m => {
        const ch = m.chapterName || 'BBYO';
        new Notification('New Member! 🎉', {
          body: `${m.fullName} joined ${ch}!`,
          icon: 'icon-192.png',
          tag: 'new-member-' + m.fullName
        });
      });
    }
    // Also show an in-app toast
    showNewMemberToast(newMembers);
  } else {
    // Update list in case names changed
    localStorage.setItem('gcr_known_members', JSON.stringify(freshMembers.map(m => m.fullName)));
  }
}
function showNewMemberToast(newMembers) {
  const existing = document.getElementById('new-member-toast');
  if (existing) existing.remove();
  const msgs = newMembers.slice(0, 5).map(m => {
    const ch = (m.chapterName || 'BBYO').replace(/ #\d+$/, '');
    return `<div style="padding:4px 0;"><b>${m.fullName}</b> → ${ch}</div>`;
  });
  if (newMembers.length > 5) msgs.push(`<div style="padding:4px 0;color:var(--text-dim);">+${newMembers.length - 5} more</div>`);
  const toast = document.createElement('div');
  toast.id = 'new-member-toast';
  toast.style.cssText = 'position:fixed;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:300;padding:16px;border-radius:16px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);animation:slideUp 0.4s ease;';
  toast.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="font-size:14px;font-weight:800;color:var(--green);">🎉 New Member${newMembers.length > 1 ? 's' : ''}!</div>
    <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">&times;</button>
  </div><div style="font-size:13px;">${msgs.join('')}</div>`;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentElement) toast.remove(); }, 10000);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
if(isIOS&&!window.navigator.standalone) setTimeout(()=>document.getElementById('install-banner').classList.add('show'),2500);
// Request notification permission shortly after load
setTimeout(requestNotificationPermission, 3000);
loadData();
</script>
</body>
