<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// GitHub Pages SPA redirect — sends all routes back to index.html
window.location.replace(window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/index.html') + window.location.search + window.location.hash);
</script>
</head>
<body></body>
</html>
